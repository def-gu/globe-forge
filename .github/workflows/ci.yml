name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check scripts
        run: |
          for f in scripts/*.mjs; do node --check "$f"; done
      - name: Validate JSON
        run: |
          for f in module.json lang/*.json manifests/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done
      - name: Run tests
        run: |
          for f in test/*.test.mjs; do node --test "$f"; done
