name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version and download URL into module.json
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            m.version = process.env.VERSION.replace(/^v/, '');
            m.download = \`https://github.com/\${process.env.GITHUB_REPOSITORY}/releases/download/\${process.env.VERSION}/module.zip\`;
            fs.writeFileSync('module.json', JSON.stringify(m, null, 2) + '\n');
          "
      - name: Build module.zip
        run: zip -qr module.zip module.json scripts lib assets manifests styles lang LICENSE README.md README.ru.md CHANGELOG.md
      - name: Create GitHub release
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$VERSION" module.zip module.json --title "$VERSION" --generate-notes
